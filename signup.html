<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up for Zoho</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="src/style.css" />
    <style>
      body {
        background-color: #fff;
        height: 100vh;
        overflow: hidden;
      }
      .signup-container {
        display: flex;
        height: 100vh;
      }
      .signup-left {
        flex: 1;
        background-color: #f7f9fa;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
        position: relative;
      }
      .signup-right {
        width: 500px;
        background-color: #fff;
        padding: 40px 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-shadow: -5px 0 30px rgba(0, 0, 0, 0.05);
        z-index: 10;
      }
      .form-control {
        border-radius: 4px;
        padding: 12px;
        border: 1px solid #ccc;
      }
      .form-control:focus {
        border-color: #0b5cff;
        box-shadow: none;
      }
      .btn-signup {
        background-color: #f0483e;
        color: #fff;
        font-weight: 500;
        padding: 12px;
        border-radius: 4px;
        border: none;
        transition: background-color 0.2s;
      }
      .btn-signup:hover {
        background-color: #d83f36;
        color: #fff;
      }
      .social-login-text {
        position: relative;
        text-align: center;
        margin: 20px 0;
      }
      .social-login-text::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        border-top: 1px solid #ddd;
        z-index: 1;
      }
      .social-login-text span {
        background: #fff;
        padding: 0 10px;
        position: relative;
        z-index: 2;
        color: #777;
        font-size: 0.85rem;
      }
      .social-btns .btn {
        border: 1px solid #ddd;
        border-radius: 4px;
        color: #555;
        font-weight: 500;
        padding: 10px;
      }
      .social-btns .btn:hover {
        background-color: #f9f9f9;
      }
      .zoho-logo {
        position: absolute;
        top: 30px;
        left: 40px;
      }
      .signup-features {
        max-width: 450px;
        margin-top: 50px;
      }
      .feature-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 30px;
      }
      .feature-item i {
        font-size: 1.5rem;
        color: #0b5cff;
        margin-right: 15px;
        margin-top: 3px;
      }
      .terms-text {
        font-size: 0.8rem;
        color: #777;
      }
      .terms-text a {
        color: #0b5cff;
        text-decoration: none;
      }
      @media (max-width: 991px) {
        .signup-container {
          flex-direction: column;
          height: auto;
        }
        .signup-left {
          display: none;
        }
        .signup-right {
          width: 100%;
          padding: 40px 20px;
          min-height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="signup-container">
      <div class="signup-left">
        <div class="zoho-logo">
          <svg
            width="100"
            height="34"
            viewBox="0 0 100 34"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g fill="none" stroke-width="4" stroke-linejoin="round">
              <rect
                x="5"
                y="8"
                width="18"
                height="18"
                rx="4"
                stroke="#e32228"
                transform="rotate(-8 14 17)"
              />
              <rect
                x="23"
                y="6"
                width="18"
                height="18"
                rx="4"
                stroke="#009a4d"
                transform="rotate(12 32 15)"
              />
              <rect
                x="42"
                y="8"
                width="18"
                height="18"
                rx="4"
                stroke="#0060a8"
                transform="rotate(-6 51 17)"
              />
              <rect
                x="62"
                y="9"
                width="18"
                height="18"
                rx="4"
                stroke="#f6a914"
                transform="rotate(8 71 18)"
              />
            </g>
            <text
              x="44"
              y="32"
              font-family="Arial, sans-serif"
              font-weight="900"
              font-size="11"
              fill="#000"
              text-anchor="middle"
              letter-spacing="4"
            >
              ZOHO
            </text>
          </svg>
        </div>

        <div class="signup-features">
          <h2 class="fw-bold mb-4">Start your free account today.</h2>
          <div class="feature-item">
            <i class="fa-solid fa-check-circle text-success"></i>
            <div>
              <h5 class="fw-bold fs-6 mb-1">Comprehensive suite</h5>
              <p class="text-muted small mb-0">
                Access 50+ apps to run your entire business.
              </p>
            </div>
          </div>
          <div class="feature-item">
            <i class="fa-solid fa-check-circle text-success"></i>
            <div>
              <h5 class="fw-bold fs-6 mb-1">Unmatched value</h5>
              <p class="text-muted small mb-0">
                Get the most out of your investment with transparent pricing.
              </p>
            </div>
          </div>
          <div class="feature-item">
            <i class="fa-solid fa-check-circle text-success"></i>
            <div>
              <h5 class="fw-bold fs-6 mb-1">Privacy guaranteed</h5>
              <p class="text-muted small mb-0">
                We never sell your data. Your privacy is our priority.
              </p>
            </div>
          </div>
        </div>

        <img
          src="https://upload.wikimedia.org/wikipedia/commons/e/e6/Zoho_Corporation_logo.svg"
          alt="Zoho Illustration"
          style="max-width: 300px; margin-top: 40px; opacity: 0.1"
        />
      </div>

      <div class="signup-right">
        <h4 class="fw-bold mb-4">Sign up for free</h4>

        <form id="signupForm" onsubmit="return handleSignup(event);">
          <div class="mb-3">
            <input
              type="text"
              class="form-control"
              id="fullName"
              placeholder="Full Name"
              required
            />
          </div>
          <div class="mb-3">
            <input
              type="email"
              class="form-control"
              id="emailAdd"
              placeholder="Email Address"
              required
            />
          </div>
          <div class="mb-3">
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Password"
              required
            />
          </div>
          <div class="mb-3">
            <input
              type="tel"
              class="form-control"
              id="phoneNumber"
              placeholder="Phone Number"
              required
            />
          </div>

          <div class="form-check mb-4 mt-3">
            <input
              class="form-check-input"
              type="checkbox"
              id="termsCheck"
              required
            />
            <label class="form-check-label terms-text" for="termsCheck">
              I agree to the <a href="#">Terms of Service</a> and
              <a href="#">Privacy Policy</a>.
            </label>
          </div>

          <button type="submit" class="btn btn-signup w-100">
            SIGN UP FOR FREE
          </button>
        </form>

        <div class="social-login-text">
          <span>or sign in using</span>
        </div>

        <div class="social-btns d-flex gap-2">
          <button
            class="btn w-100 d-flex align-items-center justify-content-center gap-2"
          >
            <i class="fa-brands fa-google text-danger"></i> Google
          </button>
          <button
            class="btn w-100 d-flex align-items-center justify-content-center gap-2"
          >
            <i class="fa-brands fa-linkedin text-primary"></i> LinkedIn
          </button>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      function handleSignup(event) {
        // Just required validation through HTML5 happens since we used "required" attributes.
        // It's simple validation to make sure user enters "something".
        event.preventDefault();

        let fullName = $("#fullName").val();
        let email = $("#emailAdd").val();
        let password = $("#password").val();

        if (fullName && email && password) {
          // Redirect back to home for now after successful "signup"
          window.location.href = "index.html";
        }
        return false;
      }
    </script>
  </body>
</html>
